version: 2

updates:
  # ------------------------------------------------------------
  # GitHub Actions (workflows + composite actions)
  # ------------------------------------------------------------
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 2
    rebase-strategy: "auto"

    # Keep PRs easy to route/triage
    labels:
      - "dependencies"
      - "github-actions"

    # Reduce PR spam by grouping updates
    groups:
      github-actions-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      github-actions-major:
        patterns:
          - "*"
        update-types:
          - "major"

    # Make PRs consistent and readable
    commit-message:
      prefix: "chore"
      include: "scope"
